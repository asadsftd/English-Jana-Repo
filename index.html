<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
</head>
<body>
    <header>
        <!-- nav section -->
         <div id="nav" class="bg-[#eeecec] py-4">
            <nav class="w-11/12 mx-auto flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div>
                        <h1 id="text"  class="text-4xl font-semibold">English</h1>
                    </div>
                    <div>
                        <img src="assets/logo.png" alt="">
                    </div>
                    <div>
                        <h1 id="text-two"  class="text-4xl font-semibold">জানালা</h1>
                    </div>
                </div>
                <div id="nav-two" class="flex items-center gap-2">
                    <div>
                        <button class="btn text-2xl rounded-lg border-2 border-[#422AD5] text-[#422AD5]"><img src="assets/fa-circle-question.png" alt=""> FAQ</button>
                    </div>
                    <div>
                        <button class="btn text-2xl rounded-lg border-2 border-[#422AD5] text-[#422AD5]"><img src="assets/fa-book-open.png" alt="">Learn</button>
                    </div>
                    <div>
                        <button id="log-out" class="btn text-2xl rounded-lg border-2 border-[#422AD5] text-[#422AD5]"><img src="assets/fa-arrow-right-from-bracket.png" alt="">Log Out</button>
                    </div>
                </div>
               
                
            </nav>
             <div id="list-icon" class="flex items-center gap-2">
             <i class="fa-solid fa-list" id="list-icon-one"></i>

                    <div id="list-icon-two" class="">
                    <i class="fa-solid fa-xmark"></i>
                </div>
                </div>
         </div>
    </header>

    <main class="w-11/12 mx-auto">
        <!--  -->
        <section id="banner-section" class="mt-10">
            <div id="banner-container" class="flex items-center  ">
                <div class="space-y-5 ">
                    <h1 class="text-5xl font-semibold" id="TEXT">
                        <span class="text-[#00BCFF]">English</span> <span class="text-[#18181B]">is Easy!!</span>
                    </h1>
                    <h1 class="w-[700px] text-[20px] font-medium" id="text-two">
                        আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
                    </h1>
                    <div class="space-y-5">
                        <input type="text" name="" class="w-[40%] h-10 indent-5 rounded-lg focus:outline-0" id="input-text" placeholder="Enter Your Name"><br>
                        <input type="password" name="" class="w-[40%] h-10 indent-5 rounded-lg focus:outline-0" id="pass"><br>
                        <button id="btn" class="btn bg-[#422AD5] text-white text-2xl rounded-md">Get Started</button>
                    </div>
                </div>
                <div class="">
                    <img src="assets/hero-student.png" alt="" class="w-[90%]" id="img" >
                </div>
            </div>
        </section>
        <!--  -->
    </main>

    <footer>

    </footer>

    <script src="style.js"></script>
</body>
</html>
